  <!-- Скрытый Google Website Translator — переводом управляет кнопка в шапке -->
  <style>
    /* Плашку Google прячем — селектор языка вынесен в шапку лендинга */
    #google_translate_widget { position: absolute !important; left: -9999px !important; top: -9999px !important; }
    body { top: 0 !important; position: static !important; }
    html { margin-top: 0 !important; }
    .skiptranslate, iframe.goog-te-banner-frame, .goog-te-banner-frame.skiptranslate { display: none !important; visibility: hidden !important; }
    .goog-tooltip, .goog-tooltip:hover { display: none !important; }
    .goog-text-highlight { background: none !important; box-shadow: none !important; }
  </style>
  <div id="google_translate_widget"><div id="google_translate_element"></div></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'ru',
        includedLanguages: 'ru,en,fr',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
