<head>
  <meta charset="utf-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap">

  <link rel="stylesheet" href="styles.css" />

  <!-- Leaflet (GIS-карта) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Переключатель языков (Google Website Translator) -->
  <style>
    #google_translate_widget {
      position: fixed; top: 12px; right: 12px; z-index: 99999;
      background: #fff; padding: 6px 10px; border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,.12);
      border: 1px solid rgba(0,0,0,.06);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    /* Прячем «шапку» с надписью Powered by Google */
    .goog-te-gadget .goog-te-combo { margin: 0; padding: 4px 8px; border-radius: 6px; border: 1px solid #ddd; font-size: 13px; cursor: pointer; }
    .goog-te-gadget > span > a { display: none !important; }
    .goog-te-gadget { font-size: 0 !important; color: transparent !important; }
    .goog-te-gadget > span { display: none !important; }
    /* Убираем баннер сверху, который Google добавляет после перевода */
    body { top: 0 !important; position: static !important; }
    html { margin-top: 0 !important; }
    .skiptranslate, iframe.goog-te-banner-frame, .goog-te-banner-frame.skiptranslate { display: none !important; visibility: hidden !important; }
    .goog-tooltip, .goog-tooltip:hover { display: none !important; }
    .goog-text-highlight { background: none !important; box-shadow: none !important; }
  </style>
  <div id="google_translate_widget"><div id="google_translate_element"></div></div>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'ru',
        includedLanguages: 'ru,en,fr',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>
